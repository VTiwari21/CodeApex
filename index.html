/* From Uiverse.io by Navarog21 */ 
/* Updated Theme Button */
button {
  position: relative;
  width: 7em;              /* smaller */
  height: 4em;             /* smaller */
  outline: none;
  transition: 0.1s;
  background-color: transparent;
  border: none;
  font-size: 12px;         /* slightly smaller text */
  font-weight: bold;
  color: #ffffff;
}

#clip {
  --color: #6e56cf;        /* YOUR THEME COLOR */
  position: absolute;
  top: 0;
  overflow: hidden;
  width: 100%;
  height: 100%;
  border: 4px double var(--color);   /* thinner border */
  box-shadow: inset 0px 0px 10px #4c3bb0;
  -webkit-clip-path: polygon(30% 0%, 70% 0%, 100% 30%, 100% 70%, 70% 100%, 30% 100%, 0% 70%, 0% 30%);
}

.arrow {
  position: absolute;
  transition: 0.2s;
  background-color: #6e56cf;
  top: 35%;
  width: 10%;
  height: 30%;
}

#leftArrow {
  left: -13%;
  -webkit-clip-path: polygon(100% 0, 100% 100%, 0 50%);
}

#rightArrow {
  -webkit-clip-path: polygon(100% 49%, 0 0, 0 100%);
  left: 102%;
}

/* Hover = lighter purple */
button:hover #rightArrow,
button:hover #leftArrow {
  background-color: #8b74ff;
}

button:hover #rightArrow {
  left: -15%;
  animation: 0.6s ease-in-out both infinite alternate rightArrow8;
}

button:hover #leftArrow {
  left: 103%;
  animation: 0.6s ease-in-out both infinite alternate leftArrow8;
}

/* Corners */
.corner {
  position: absolute;
  width: 3em;              /* smaller */
  height: 3em;
  background-color: #6e56cf;
  box-shadow: inset 1px 1px 6px #4c3bb0;
  transform: scale(1) rotate(45deg);
  transition: 0.2s;
}

#rightTop {
  top: -1.5em;
  left: 90%;
}

#leftTop {
  top: -1.5em;
  left: -2.5em;
}

#leftBottom {
  top: 1.8em;
  left: -2em;
}

#rightBottom {
  top: 45%;
  left: 88%;
}

/* Hover effects */
button:hover .corner {
  transform: scale(1.2) rotate(45deg);
}

button:hover #clip {
  animation: 0.2s ease-in-out 0.55s both greenLight8;
  --color: #8b74ff;
}

/* Animations */
@keyframes greenLight8 {
  to {
    box-shadow: inset 0px 0px 20px #8b74ff;
  }
}

@keyframes leftArrow8 {
  to {
    transform: translateX(8px);
  }
}

@keyframes rightArrow8 {
  to {
    transform: translateX(-8px);
  }
}
.btn{

/* From Uiverse.io by alexruix */ 
.card {
 width: 190px;
